<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>发帖 - 校园论坛</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">🎓 校园论坛</div>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html">首页</a>
      <a href="create.html" class="active">发帖</a>
      <a href="discover.html">发现</a>
      <a href="messages.html">消息<span id="notification-badge" class="badge" style="display: none;"></span></a>
    </nav>
    <div class="user" id="user-info">
    </div>
    <div class="user-avatar" id="user-avatar" style="display: none;" title="个人中心"></div>
  </header>

  <div class="container" style="max-width: 800px; margin: 0 auto; padding: 24px;">
    <main class="main">
      <form id="create-form" class="card">
        <h2>发布新帖</h2>
        <div class="form-group">
          <label for="title">标题</label>
          <input type="text" id="title" name="title" class="form-control" placeholder="请输入标题" required />
        </div>
        <div class="form-group">
          <label for="category">分类</label>
          <select id="category" name="category" class="form-control" required>
            <option value="">请选择分类</option>
            <option value="学习交流">学习交流</option>
            <option value="生活分享">生活分享</option>
            <option value="活动通知">活动通知</option>
            <option value="问题求助">问题求助</option>
            <option value="兴趣爱好">兴趣爱好</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tags">标签</label>
          <input type="text" id="tags" name="tags" class="form-control" placeholder="请输入标签，用逗号分隔" />
        </div>
        <div class="form-group">
          <label for="summary">摘要</label>
          <textarea id="summary" name="summary" class="form-control" placeholder="请输入摘要" required></textarea>
        </div>
        <div class="form-group">
          <label for="content">正文</label>
          <textarea id="content" name="content" class="form-control" placeholder="请输入正文" required style="min-height: 300px;"></textarea>
        </div>
        <div class="form-group">
          <label>上传图片（可选）</label>
          <div id="image-upload-area" style="border: 2px dashed #d9d9d9; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5" style="margin-bottom: 8px;">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
            </svg>
            <p style="color: #999; font-size: 14px; margin: 0;">点击或拖拽上传图片（支持 jpg/png/gif，最大 5MB）</p>
            <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;" />
          </div>
          <div id="image-preview" style="margin-top: 12px; display: none;">
            <div style="position: relative; display: inline-block;">
              <img id="preview-img" style="max-width: 300px; max-height: 200px; border-radius: 8px; border: 1px solid #eee;" />
              <button type="button" id="remove-image" style="position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background: #f56c6c; color: #fff; border: none; cursor: pointer; font-size: 14px; line-height: 1;">×</button>
            </div>
            <input type="hidden" id="image-url" name="imageUrl" />
          </div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
          <button type="button" class="btn btn-outline" onclick="window.location.href='index.html'">取消</button>
          <button type="submit" class="btn btn-primary">发布</button>
        </div>
      </form>
    </main>
  </div>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <p>&copy; 2026 重庆邮电大学 校园论坛</p>
      <p style="font-size: 12px;">Web综合设计实践 | 联系我们: campus@cqupt.edu.cn</p>
    </div>
  </footer>

  <script type="module" src="../JavaScript/create.js"></script>
</body>
</html>
