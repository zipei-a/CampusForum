<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>帖子详情 - 校园论坛</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">🎓 校园论坛</div>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html">首页</a>
      <a href="create.html">发帖</a>
      <a href="discover.html">发现</a>
      <a href="messages.html">消息<span id="notification-badge" class="badge" style="display: none;"></span></a>
    </nav>
    <div class="user" id="user-info">
    </div>
    <div class="user-avatar" id="user-avatar" style="display: none;" title="个人中心"></div>
  </header>

  <div class="container" style="max-width: 800px; margin: 0 auto; padding: 24px;">
    <main class="main">
      <article id="post-detail" class="card">
        <!-- JS 动态插入帖子详情 -->
      </article>
      
      <section id="comments-section" class="card" style="margin-top: 24px;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">评论</h3>
        <div id="comments-list" class="comment-list"></div>
        <div class="form-group" style="margin-top: 20px;">
          <textarea id="comment-input" class="form-control" placeholder="写下你的评论..." style="min-height: 100px;"></textarea>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
          <button id="submit-comment" class="btn btn-primary">发表评论</button>
        </div>
      </section>
    </main>
  </div>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <p>&copy; 2026 重庆邮电大学 校园论坛</p>
      <p style="font-size: 12px;">Web综合设计实践 | 联系我们: campus@cqupt.edu.cn</p>
    </div>
  </footer>

  <script type="module" src="../JavaScript/detail.js"></script>
</body>
</html>
