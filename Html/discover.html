<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>发现 - 校园论坛</title>
  <meta name="description" content="发现重庆邮电大学校园资源，包括兼职、活动、新闻等。" />
  <meta property="og:title" content="发现 - 校园论坛" />
  <meta property="og:description" content="发现重庆邮电大学校园资源，包括兼职、活动、新闻等。" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#2D6A4F" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">🎓 校园论坛</div>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html">首页</a>
      <a href="create.html">发帖</a>
      <a href="discover.html" class="active">发现</a>
      <a href="messages.html">消息<span id="notification-badge" class="badge" style="display: none;"></span></a>
    </nav>
    <div class="user" id="user-info">
    </div>
    <div class="user-avatar" id="user-avatar" style="display: none;" title="个人中心"></div>
  </header>

  <div class="container" style="max-width: 1100px; margin: 0 auto; padding: 24px;">
    <main class="main">
      <!-- 教务在线入口 -->
      <section class="discover-card card">
        <div class="discover-card-header">
          <div class="discover-card-icon">🎓</div>
          <div class="discover-card-info">
            <h2>教务在线</h2>
            <p>访问学校教务系统，查询课表、成绩、考试安排等学业信息</p>
          </div>
          <a id="jw-home-link" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">进入教务系统 →</a>
        </div>
      </section>

      <!-- 接发兼职板块 -->
      <section class="discover-card card">
        <div class="discover-card-header" style="border-bottom: 1px solid #e6eee6; padding-bottom: 16px; margin-bottom: 16px;">
          <div class="discover-card-icon">💼</div>
          <div class="discover-card-info">
            <h2>校园兼职</h2>
            <p>发布或寻找校内外兼职，勤工俭学好帮手</p>
          </div>
          <button class="btn btn-primary" id="btn-publish-job" onclick="document.getElementById('job-publish-modal').style.display='flex'">发布兼职</button>
        </div>
        <div id="job-list" class="job-list">
          <div class="loading-placeholder">加载中...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- 发布兼职弹窗 -->
  <div class="modal-overlay" id="job-publish-modal" style="display:none">
    <div class="modal-box card">
      <div class="modal-header">
        <h3>📝 发布兼职</h3>
        <button class="modal-close" onclick="document.getElementById('job-publish-modal').style.display='none'">&times;</button>
      </div>
      <form id="job-publish-form">
        <div class="form-group">
          <label>兼职标题 <span class="required">*</span></label>
          <input type="text" name="title" placeholder="如：周末传单派发" required maxlength="100"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>薪资待遇</label>
            <input type="text" name="salary" placeholder="如：120元/天" maxlength="50"/>
          </div>
          <div class="form-group">
            <label>工作地点</label>
            <input type="text" name="location" placeholder="如：学校南门" maxlength="100"/>
          </div>
        </div>
        <div class="form-group">
          <label>联系方式 <span class="required">*</span></label>
          <input type="text" name="contact" placeholder="手机号或微信" required maxlength="100"/>
        </div>
        <div class="form-group">
          <label>兼职描述 <span class="required">*</span></label>
          <textarea name="description" rows="4" placeholder="详细描述工作内容、时间、要求等" required maxlength="1000"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">发布</button>
      </form>
    </div>
  </div>

  <!-- 报名弹窗 -->
  <div class="modal-overlay" id="job-apply-modal" style="display:none">
    <div class="modal-box card">
      <div class="modal-header">
        <h3>📋 报名兼职</h3>
        <button class="modal-close" onclick="document.getElementById('job-apply-modal').style.display='none'">&times;</button>
      </div>
      <form id="job-apply-form">
        <input type="hidden" name="jobId" />
        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" name="name" placeholder="你的真实姓名" required maxlength="50"/>
        </div>
        <div class="form-group">
          <label>联系电话 <span class="required">*</span></label>
          <input type="text" name="phone" placeholder="手机号码" required maxlength="20"/>
        </div>
        <div class="form-group">
          <label>备注留言</label>
          <textarea name="message" rows="3" placeholder="可选，补充说明" maxlength="500"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">提交报名</button>
      </form>
    </div>
  </div>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <p>&copy; 2026 重庆邮电大学 校园论坛</p>
      <p style="font-size: 12px;">Web综合设计实践 | 联系我们: campus@cqupt.edu.cn</p>
    </div>
  </footer>

  <script type="module" src="../JavaScript/discover.js"></script>
  <!-- 回到顶部按钮 -->
  <button id="scroll-to-top" title="回到顶部" style="display:none;position:fixed;bottom:32px;right:32px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2D6A4F,#52B788);color:#fff;border:none;cursor:pointer;font-size:20px;box-shadow:0 4px 16px rgba(45,106,79,0.3);z-index:9999;transition:all 0.3s ease;align-items:center;justify-content:center;">↑</button>
  <script>
  (function(){
    var btn=document.getElementById('scroll-to-top');
    if(!btn)return;
    window.addEventListener('scroll',function(){
      btn.style.display=window.scrollY>300?'flex':'none';
    });
    btn.addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
  })();
  </script>
</body>
</html>
