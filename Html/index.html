<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>校园论坛 - 首页</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">校园论坛</div>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html" class="active">首页</a>
      <a href="create.html">发帖</a>
      <a href="discover.html">发现</a>
      <a href="messages.html">消息<span id="notification-badge" class="badge" style="display: none;"></span></a>
    </nav>
    <div class="user" id="user-info">
    </div>
    <div class="user-avatar" id="user-avatar" style="display: none;" title="个人中心"></div>
  </header>

  <div class="container" style="display: flex; padding: 24px 0;">
    <aside class="sidebar">
      <h3>📂 论坛分类</h3>
      <ul>
        <li class="active">📋 全部</li>
        <li>📚 学习交流</li>
        <li>🌟 生活分享</li>
        <li>📢 活动通知</li>
        <li>❓ 问题求助</li>
        <li>🎯 兴趣爱好</li>
      </ul>
      
      <h3>🔥 热门标签</h3>
      <ul>
        <li>前端开发</li>
        <li>后端开发</li>
        <li>考研</li>
        <li>就业</li>
        <li>社团</li>
        <li>比赛</li>
      </ul>
    </aside>
    
    <main class="main">
      <div class="search-box" style="margin-bottom: 16px; max-width: 100%;">
        <input type="text" id="search-input" class="search-input" placeholder="搜索帖子标题或内容..." />
        <span class="search-icon" id="search-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
        </span>
      </div>
      <div class="card" style="margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 id="post-list-title">最新帖子</h2>
          <a href="create.html" class="btn btn-primary">发布帖子</a>
        </div>
        <section id="post-list" class="post-list">
        </section>
        <div id="pagination-container"></div>
      </div>
    </main>
  </div>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <p>&copy; 2026 重庆邮电大学 校园论坛</p>
      <p style="font-size: 12px;">Web综合设计实践 | 联系我们: campus@cqupt.edu.cn</p>
    </div>
  </footer>

  <script type="module" src="../JavaScript/main.js"></script>
</body>
</html>
