<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>个人中心 - 校园论坛</title>
  <meta name="description" content="查看和编辑你在校园论坛的个人资料与发帖记录。" />
  <meta property="og:title" content="个人主页 - 校园论坛" />
  <meta property="og:description" content="查看和编辑你在校园论坛的个人资料与发帖记录。" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#2D6A4F" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">🎓 校园论坛</div>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html">首页</a>
      <a href="create.html">发帖</a>
      <a href="discover.html">发现</a>
      <a href="messages.html">消息<span id="notification-badge" class="badge" style="display: none;"></span></a>
    </nav>
    <div class="user" id="user-info">
    </div>
  </header>

  <div class="container" style="max-width: 900px; margin: 0 auto; padding: 24px;">
    <main class="main">
      <div class="profile-header" id="profile-header">
        <div class="profile-avatar" id="profile-avatar"></div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-bio" id="profile-bio"></div>
        <div class="user-card-stats" style="justify-content: center; margin-top: 16px;">
          <div class="user-card-stat">
            <div class="user-card-stat-value" id="post-count" style="color: #fff;">0</div>
            <div class="user-card-stat-label" style="color: rgba(255,255,255,0.8);">帖子</div>
          </div>
          <div class="user-card-stat">
            <div class="user-card-stat-value" id="favorite-count" style="color: #fff;">0</div>
            <div class="user-card-stat-label" style="color: rgba(255,255,255,0.8);">收藏</div>
          </div>
          <div class="user-card-stat">
            <div class="user-card-stat-value" id="like-count" style="color: #fff;">0</div>
            <div class="user-card-stat-label" style="color: rgba(255,255,255,0.8);">获赞</div>
          </div>
        </div>
      </div>

      <div class="profile-tabs" id="profile-tabs">
        <div class="profile-tab active" data-tab="posts">我的帖子</div>
        <div class="profile-tab" data-tab="favorites">我的收藏</div>
        <div class="profile-tab" data-tab="settings">个人设置</div>
      </div>

      <div class="card" style="border-radius: 0 0 8px 8px; margin-top: 0;">
        <div id="tab-content">
        </div>
      </div>
    </main>
  </div>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <p>&copy; 2026 重庆邮电大学 校园论坛</p>
      <p style="font-size: 12px;">Web综合设计实践 | 联系我们: campus@cqupt.edu.cn</p>
    </div>
  </footer>

  <script type="module" src="../JavaScript/profile.js"></script>
  <!-- 回到顶部按钮 -->
  <button id="scroll-to-top" title="回到顶部" style="display:none;position:fixed;bottom:32px;right:32px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2D6A4F,#52B788);color:#fff;border:none;cursor:pointer;font-size:20px;box-shadow:0 4px 16px rgba(45,106,79,0.3);z-index:9999;transition:all 0.3s ease;align-items:center;justify-content:center;">↑</button>
  <script>
  (function(){
    var btn=document.getElementById('scroll-to-top');
    if(!btn)return;
    window.addEventListener('scroll',function(){
      btn.style.display=window.scrollY>300?'flex':'none';
    });
    btn.addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
  })();
  </script>
</body>
</html>
